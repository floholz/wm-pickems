# Example: one container per bot. Copy to docker-compose.yml, create a per-bot
# env file (see .env.example), and `docker compose up -d`.
#
# The image is built once (by the first service) and reused by the rest — each
# bot is just the same image with its own env file (different BOT_EMAIL /
# CLAUDE_MODEL / etc.).

services:
  # The algorithmic bot — same image, BOT_KIND=algo, no API key needed.
  elo:
    build: .
    image: wm-pickems/bot:latest
    container_name: wmp_bot_elo
    restart: unless-stopped
    env_file: .elo.env # BOT_EMAIL, BOT_PASSWORD, BOT_KIND=algo, WMP_BASE_URL, ...
    command: ["--loop", "--interval=1h"]
    networks: [wmpickems]

  # anthropic:
  #   image: wm-pickems/bot:latest
  #   container_name: wmp_bot_claude
  #   restart: unless-stopped
  #   env_file: .claude-native.env # BOT_EMAIL, BOT_PASSWORD, ANTHROPIC_API_KEY, WMP_BASE_URL, ...
  #   command: ["--loop", "--interval=1h"]
  #   networks: [wmpickems]
  #   depends_on: [elo]

  # More model bots via OpenRouter — same image, BOT_KIND=openrouter, one
  # OPENROUTER_API_KEY shared across them; only OPENROUTER_MODEL differs per env.
  # chatgpt:
  #   image: wm-pickems/bot:latest
  #   container_name: wmp_bot_chatgpt
  #   restart: unless-stopped
  #   env_file: .chatgpt.env # ...BOT_KIND=openrouter, OPENROUTER_API_KEY, OPENROUTER_MODEL=openai/gpt-5.1
  #   command: ["--loop", "--interval=1h"]
  #   networks: [wmpickems]
  #   depends_on: [claude]

  gemini:
    image: wm-pickems/bot:latest
    container_name: wmp_bot_gemini
    restart: unless-stopped
    env_file: .gemini.env # ...BOT_KIND=openrouter, OPENROUTER_API_KEY, OPENROUTER_MODEL=google/gemini-2.5-pro
    command: ["--loop", "--interval=1h"]
    networks: [wmpickems]
    depends_on: [elo]

  claude:
    image: wm-pickems/bot:latest
    container_name: wmp_bot_claude
    restart: unless-stopped
    env_file: .claude.env # ...BOT_KIND=openrouter, OPENROUTER_API_KEY, OPENROUTER_MODEL=google/gemini-2.5-pro
    command: ["--loop", "--interval=1h"]
    networks: [wmpickems]
    depends_on: [elo]

  gpt:
    image: wm-pickems/bot:latest
    container_name: wmp_bot_gpt
    restart: unless-stopped
    env_file: .gpt.env # ...BOT_KIND=openrouter, OPENROUTER_API_KEY, OPENROUTER_MODEL=google/gemini-2.5-pro
    command: ["--loop", "--interval=1h"]
    networks: [wmpickems]
    depends_on: [elo]

networks:
  wmpickems:
    external: true
